services:

  # ── Databases ────────────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: omnibioai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DEFAULT_DB:-omnibioai}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: omnibioai-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  # ── Core services ────────────────────────────────────────────────────────────

  toolserver:
    build:
      context: ../../omnibioai-toolserver
    container_name: omnibioai-toolserver
    ports:
      - "9090:9090"
    environment:
      TOOLSERVER_RUN_STORE_DIR: ${TOOLSERVER_RUN_STORE_DIR:-/workspace/omnibioai-toolserver/out/runs}
    volumes:
      - ../../:/workspace
    command: >
      uvicorn toolserver_app:create_app
      --factory
      --host 0.0.0.0
      --port 9090
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9090/health', timeout=2).read(); print('ok')\""
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  tes:
    build:
      context: ../../omnibioai-tes
    container_name: omnibioai-tes
    user: "1000:1000"
    environment:
      HOST: 0.0.0.0
      PORT: "8081"
      TES_UPGRADE: ${TES_UPGRADE:-0}
      TOOLSERVER_BASE_URL: ${TOOLSERVER_BASE_URL:-http://toolserver:9090}
      TES_WORKDIR: ${TES_WORKDIR:-/workspace/out/omnibioai-tes}
      TES_TOOLS: /workspace/configs/tools.example.yaml
      TES_SERVERS: /workspace/configs/servers.example.yaml
    ports:
      - "${TES_PORT:-8081}:8081"
    volumes:
      - ../../omnibioai-tes:/workspace
      - /usr/bin/sbatch:/usr/bin/sbatch:ro
      - /usr/bin/squeue:/usr/bin/squeue:ro
      - /usr/bin/scancel:/usr/bin/scancel:ro
      - /usr/lib/aarch64-linux-gnu/libslurm.so.40.0.0:/usr/lib/aarch64-linux-gnu/libslurm.so.40.0.0:ro
      - /usr/lib/aarch64-linux-gnu/libmunge.so.2:/usr/lib/aarch64-linux-gnu/libmunge.so.2:ro
      - /usr/lib/aarch64-linux-gnu/slurm-wlm:/usr/lib/aarch64-linux-gnu/slurm-wlm:ro
      - /etc/slurm:/etc/slurm:ro
      - /var/run/munge:/var/run/munge
      - /run/slurmctld:/run/slurmctld
      - /var/spool/slurmd:/var/spool/slurmd
      - /tmp/omnibioai_tes_runs:/tmp/omnibioai_tes_runs
      - /home/manish/Desktop/machine/omnibioai/work:/app/work
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - /usr/lib/x86_64-linux-gnu/libmunge.so.2:/usr/lib/x86_64-linux-gnu/libmunge.so.2:ro
      - /home/manish/Desktop/machine/omnibioai/work:/app/work
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    command:
      - bash
      - -lc
      - |
        omnibioai-tes serve \
          --host 0.0.0.0 \
          --port 8081 \
          --tools /workspace/configs/tools.example.yaml \
          --servers /workspace/configs/servers.example.yaml
    depends_on:
      toolserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=2).read(); print('ok')\""
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  model-registry:
    build:
      context: ../../omnibioai-model-registry
    container_name: omnibioai-model-registry
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      HOST: 0.0.0.0
      PORT: "8095"
      MODEL_REGISTRY_APP: "omnibioai_model_registry.service.app.main:app"
      DB_HOST: ${MYSQL_HOST:-mysql}
      DB_PORT: "${MYSQL_PORT:-3306}"
      DB_NAME: ${MODEL_REGISTRY_DB_NAME:-model_registry}
      DB_USER: ${MYSQL_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REGISTRY_ROOT: ${REGISTRY_ROOT:-/workspace/local_registry}
    ports:
      - "${MODEL_REGISTRY_PORT:-8095}:8095"
    volumes:
      - ../../:/workspace
      - ../../local_registry:/workspace/local_registry
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/health', timeout=2).read(); print('ok')\""
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  lims-x:
    build:
      context: ../../omnibioai-lims
    container_name: lims-x
    environment:
      DJANGO_SETTINGS_MODULE: lab_data_manager.settings
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: "${MYSQL_PORT:-3306}"
      MYSQL_DATABASE: ${LIMSX_DB_NAME:-limsdb}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DJANGO_DEBUG: "${LIMSX_DJANGO_DEBUG:-True}"
      DJANGO_SECRET_KEY: ${LIMSX_DJANGO_SECRET_KEY:-dev-secret}
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,lims-x"
    ports:
      - "${LIMSX_PORT:-7000}:7000"
    volumes:
      - ../../:/workspace
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["bash", "-lc", "python manage.py migrate && python manage.py runserver 0.0.0.0:7000"]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7000/', timeout=2).read(); print('ok')\""
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # ── AI services ──────────────────────────────────────────────────────────────
  # rag service will be added post-beta once omnibioai-rag has a Dockerfile
  # rag:
  #   build:
  #     context: ../../omnibioai-rag
  #   container_name: omnibioai-rag
  #   environment:
  #     OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  #     RAG_DB_PATH: ${RAG_DB_PATH:-/workspace/data/rag}
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   ports:
  #     - "${RAG_PORT:-8088}:8088"
  #   volumes:
  #     - ../../:/workspace
  #     - ../../data:/workspace/data
  #   restart: unless-stopped

  # ── Workbench ────────────────────────────────────────────────────────────────

  omnibioai:
    user: "1000:1000"
    build:
      context: ../../omnibioai
    container_name: omnibioai-workbench
    environment:
      DEBUG: "1"
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-omnibioai.settings}
      DB_HOST: ${MYSQL_HOST:-mysql}
      DB_PORT: "${MYSQL_PORT:-3306}"
      DB_NAME: ${OMNIBIOAI_DB_NAME:-omnibioai}
      DB_USER: ${MYSQL_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: "${REDIS_PORT:-6379}"
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      TES_BASE_URL: ${TES_BASE_URL:-http://tes:8081}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      TOOLSERVER_BASE_URL: ${TOOLSERVER_BASE_URL:-http://toolserver:9090}
      MODEL_REGISTRY_BASE_URL: ${MODEL_REGISTRY_BASE_URL:-http://model-registry:8095}
      WORKSPACE_ROOT: /workspace
      OMNIBIOAI_TES_URL: ${TES_BASE_URL:-http://tes:8081}
      OMNIBIOAI_MYSQL_HOST: ${MYSQL_HOST:-mysql}
      OMNIBIOAI_MYSQL_PORT: "${MYSQL_PORT:-3306}"
      OMNIBIOAI_MYSQL_USER: ${MYSQL_USER:-root}
      OMNIBIOAI_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      OMNIBIOAI_MYSQL_DB: ${OMNIBIOAI_DB_NAME:-omnibioai}
      TORCHINDUCTOR_CACHE_DIR: /tmp/torchinductor_cache
      TRANSFORMERS_CACHE: /tmp/transformers_cache
      HF_HOME: /tmp/hf_home
    ports:
      - "${WORKBENCH_PORT:-8000}:8000"
    volumes:
      - ../../:/workspace
      - ../../data:/workspace/data
      - ../../omnibioai:/app
      - ../../omnibioai/data/PubMed:/workspace/data/PubMed
      - ../../work:/workspace/work
      - ../../out:/workspace/out
      - ../../tmpdata:/workspace/tmpdata
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      tes:
        condition: service_healthy
      toolserver:
        condition: service_healthy
      model-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["bash", "-lc", "python manage.py migrate && python manage.py runserver 0.0.0.0:8000 --noreload"]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=2).read(); print('ok')\""
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  celery-worker:
    build:
      context: ../../omnibioai
    container_name: omnibioai-celery-worker
    user: "1000:1000"
    environment:
      DEBUG: "1"
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-omnibioai.settings}
      DB_HOST: ${MYSQL_HOST:-mysql}
      DB_PORT: "${MYSQL_PORT:-3306}"
      DB_NAME: ${OMNIBIOAI_DB_NAME:-omnibioai}
      DB_USER: ${MYSQL_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: "${REDIS_PORT:-6379}"
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      TES_BASE_URL: ${TES_BASE_URL:-http://tes:8081}
      TOOLSERVER_BASE_URL: ${TOOLSERVER_BASE_URL:-http://toolserver:9090}
      MODEL_REGISTRY_BASE_URL: ${MODEL_REGISTRY_BASE_URL:-http://model-registry:8095}
      WORKSPACE_ROOT: /workspace
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OMNIBIOAI_TES_URL: ${TES_BASE_URL:-http://tes:8081}
      TORCHINDUCTOR_CACHE_DIR: /tmp/torchinductor_cache
      TRANSFORMERS_CACHE: /tmp/transformers_cache
      HF_HOME: /tmp/hf_home
    volumes:
      - ../../:/workspace
      - ../../data:/workspace/data
      - ../../work:/workspace/work
      - ../../out:/workspace/out
      - ../../tmpdata:/workspace/tmpdata
      - ../../omnibioai:/app
    depends_on:
      omnibioai:
        condition: service_healthy
      model-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["bash", "-lc", "celery -A omnibioai worker -l info"]
    restart: unless-stopped

  # ── Control Center ───────────────────────────────────────────────────────────

  control-center:
    build:
      context: ../../omnibioai-control-center
      dockerfile: docker/Dockerfile
    container_name: omnibioai-control-center
    environment:
      CONTROL_CENTER_CONFIG: /config/control_center.yaml
      WORKSPACE_ROOT: /workspace
      CONTROL_CENTER_PORT: "${CONTROL_CENTER_PORT:-7070}"
    volumes:
      - ../../:/workspace
      - ../../omnibioai-control-center/config:/config:ro
    ports:
      - "${CONTROL_CENTER_PORT:-7070}:7070"
    command:
      - bash
      - -lc
      - |
        cd /workspace/omnibioai-control-center/backend && \
        uvicorn control_center.main:app --host 0.0.0.0 --port 7070
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      tes:
        condition: service_healthy
      toolserver:
        condition: service_healthy
      model-registry:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7070/health', timeout=2).read(); print('ok')\""
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data: